# ─── Gradle Performance ──────────────────────────────────────
# JVM: more heap = fewer GC pauses during compilation
org.gradle.jvmargs=-Xmx4096m -XX:+UseParallelGC -Dfile.encoding=UTF-8

# Parallel task execution (halves build time on multi-core)
org.gradle.parallel=true

# Configuration cache — skip re-evaluating build scripts
org.gradle.configuration-cache=true

# Build cache — reuse outputs from previous builds
org.gradle.caching=true

# Kotlin incremental + daemon keep-alive
kotlin.code.style=official
kotlin.incremental=true

# ─── Network Proxy ───────────────────────────────────────────
systemProp.http.proxyHost=127.0.0.1
systemProp.http.proxyPort=7890
systemProp.https.proxyHost=127.0.0.1
systemProp.https.proxyPort=7890